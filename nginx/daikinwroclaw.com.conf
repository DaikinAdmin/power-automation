# Nginx configuration for daikinwroclaw.com (UA test domain → powerautomation.com.ua behavior)
# File: /etc/nginx/sites-available/daikinwroclaw.com
#
# After creating/updating this file on VPS:
# 1. sudo cp nginx/daikinwroclaw.com.conf /etc/nginx/sites-available/daikinwroclaw.com
# 2. sudo ln -s /etc/nginx/sites-available/daikinwroclaw.com /etc/nginx/sites-enabled/
# 3. sudo certbot --nginx -d daikinwroclaw.com -d www.daikinwroclaw.com
# 4. sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pa.daikinkobierzuce.pl www.pa.daikinkobierzuce.pl;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for daikinwroclaw.com (UA test domain)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pa.daikinkobierzuce.pl www.pa.daikinkobierzuce.pl;

    # SSL Configuration (managed by Certbot — will be filled in automatically)
    ssl_certificate /etc/letsencrypt/live/daikinwroclaw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daikinwroclaw.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Additional SSL Security Settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/daikinwroclaw-access.log;
    error_log /var/log/nginx/daikinwroclaw-error.log;

    # Client body size limit (for file uploads)
    client_max_body_size 50M;
    client_body_timeout 600s;

    # API routes with extended timeouts (for bulk operations)
    location ~ ^/api/admin/(items/bulk-upload|brands/bulk-upload) {
        proxy_pass http://localhost:3060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Main Next.js application — same container as powerautomation.pl
    location / {
        proxy_pass http://localhost:3060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
}
